<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Totally Normal Website</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: black;
        color: white;
        font-family: Arial, sans-serif;
        overflow: hidden;
        cursor: pointer;
    }

    #message {
        font-size: 2rem;
        text-align: center;
    }

    .scary {
        background: red;
        color: yellow;
        font-size: 5rem;
        animation: flash 0.2s infinite;
    }

    @keyframes flash {
        0% { background: red; }
        50% { background: black; }
        100% { background: red; }
    }
</style>
</head>
<body>

<div id="message">
    Click anywhere to continue...
</div>

<script>
function goFullscreen() {
    const elem = document.documentElement;

    if (elem.requestFullscreen) {
        elem.requestFullscreen();
    }

    // Change page content for prank
    document.body.classList.add("scary");
    document.getElementById("message").innerHTML =
        "💀 YOU HAVE BEEN PRANKED 💀";

    // Optional sound
    const audio = new Audio(
        "https://www.soundjay.com/button/beep-07.wav"
    );
    audio.play();
}

// Trigger on first click
document.body.addEventListener("click", goFullscreen, { once: true });
</script>

</body>
</html>
